name: repro-macos-port-14409

on: workflow_dispatch

jobs:
  repro:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, macos-15, macos-26, macos-14, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    steps:
      - name: Environment info
        run: |
          echo "ImageOS=$ImageOS ImageVersion=$ImageVersion"
          uname -a
          if [ "$(uname)" = "Darwin" ]; then
            sw_vers
            echo "HostName=$(scutil --get HostName 2>&1)"
            echo "LocalHostName=$(scutil --get LocalHostName 2>&1)"
          fi
          echo "--- /etc/hosts ---"
          cat /etc/hosts
          echo "--- python locations/versions ---"
          which -a python python3 2>&1 || true
          python -VV 2>&1 || true
          python3 -VV 2>&1 || true

      - name: getfqdn / reverse-DNS timing (suspected culprit, ref 12162/10924)
        run: |
          for h in "127.0.0.1" "0.0.0.0" "localhost"; do
            python3 -c "import socket,sys,time; h=sys.argv[1]; t=time.time(); r=socket.getfqdn(h); print('getfqdn(%r) -> %r in %.2fs' % (h, r, time.time()-t))" "$h"
          done
          python3 -c "import socket,time; t=time.time(); r=socket.getfqdn(); print('getfqdn() -> %r in %.2fs' % (r, time.time()-t))"

      - name: bare bind+listen (no http.server, no getfqdn)
        run: |
          python3 -c "
          import socket, time
          s = socket.socket()
          s.setsockopt(socket.SOL_SOCKET, socket.SO_REUSEADDR, 1)
          s.bind(('127.0.0.1', 8005))
          s.listen(5)
          print('bind+listen OK', flush=True)
          time.sleep(10)" &
          sleep 2
          echo "=== port 8005 state at t=2s ==="
          if [ "$(uname)" = "Darwin" ]; then
            netstat -anv | grep '\.8005' || echo "no socket found"
          else
            ss -atn | grep ':8005' || echo "no socket found"
          fi
          wait

      - name: reporter repro + patched control + extended observation
        run: |
          nc -l 8001 > /tmp/nc.log 2>&1 &
          python  -m http.server 8002 --bind 127.0.0.1 > /tmp/py8002.log 2>&1 &
          python3 -m http.server 8003 --bind 127.0.0.1 > /tmp/py8003.log 2>&1 &
          if [ "$(uname)" = "Darwin" ]; then
            /usr/bin/python3 -m http.server 8004 --bind 127.0.0.1 > /tmp/py8004.log 2>&1 &
          fi
          # control: identical server but getfqdn stubbed out -> should LISTEN immediately
          python3 -c "
          import socket, time
          socket.getfqdn = lambda name='': '127.0.0.1'
          from http.server import ThreadingHTTPServer, SimpleHTTPRequestHandler
          t = time.time()
          srv = ThreadingHTTPServer(('127.0.0.1', 8006), SimpleHTTPRequestHandler)
          print('patched server listening in %.2fs' % (time.time()-t), flush=True)
          srv.serve_forever()" > /tmp/py8006.log 2>&1 &
          # candidate user-facing workaround: same CLI, getfqdn stubbed via runpy
          python3 -c "import socket, runpy; socket.getfqdn = lambda name='': name; runpy.run_module('http.server', run_name='__main__')" 8008 --bind 127.0.0.1 > /tmp/py8008.log 2>&1 &
          prev=0
          for t in 2 10 30 65 120 180; do
            sleep $((t - prev)); prev=$t
            echo "=== socket states at t=${t}s ==="
            if [ "$(uname)" = "Darwin" ]; then
              netstat -anv | grep -E '\.800[1-8] ' || echo "no sockets found"
            else
              ss -atn | grep -E ':800[1-8]' || echo "no sockets found"
            fi
          done
          echo "=== curl checks (5s timeout each) ==="
          for p in 8002 8003 8004 8006 8008; do
            curl -s -o /dev/null -w "port $p -> HTTP %{http_code}\n" --max-time 5 "http://127.0.0.1:$p/" || echo "port $p -> curl failed rc=$?"
          done
          echo "=== python server stdout/stderr ==="
          for p in 8002 8003 8004 8006 8008; do
            echo "--- port $p ---"; cat /tmp/py$p.log 2>/dev/null || true
          done

      - name: known /etc/hosts workaround from 8649, then retry
        if: runner.os == 'macOS'
        run: |
          echo "$(ipconfig getifaddr en0) $(hostname -f) $(hostname -s)" | sudo tee -a /etc/hosts
          dscacheutil -flushcache || true
          python3 -m http.server 8007 --bind 127.0.0.1 > /tmp/py8007.log 2>&1 &
          sleep 2
          echo "=== port 8007 state at t=2s (after /etc/hosts append) ==="
          netstat -anv | grep '\.8007' || echo "no socket found"
          python3 -c "import socket,time; t=time.time(); r=socket.getfqdn('127.0.0.1'); print('getfqdn(127.0.0.1) after hosts append -> %r in %.2fs' % (r, time.time()-t))"

      - name: firewall state (macOS)
        if: runner.os == 'macOS'
        run: |
          sudo /usr/libexec/ApplicationFirewall/socketfilterfw --getglobalstate || true
          sudo /usr/libexec/ApplicationFirewall/socketfilterfw --getblockall || true
          sudo /usr/libexec/ApplicationFirewall/socketfilterfw --listapps || true

      - name: mDNSResponder / DNS state (macOS)
        if: runner.os == 'macOS'
        run: |
          sudo launchctl print system/com.apple.mDNSResponder 2>&1 | head -30 || true
          echo "--- scutil --dns (first 40 lines) ---"
          scutil --dns | head -40
