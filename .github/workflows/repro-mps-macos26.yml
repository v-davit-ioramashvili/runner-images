name: Repro MPS availability/outputs (macos-15 vs macos-26) - issue 14380

# Run manually from the Actions tab. Reproduces / disproves the report in
# https://github.com/actions/runner-images/issues/14380 :
# PyTorch tests that select the `mps` backend pass on macos-15 but produce
# different numeric outputs on macos-26 (both arm64).
#
# The reporter used the `macos-latest` label, which migrated from macos-15 to
# macos-26 during the June 15 - July 15 2026 rollout (issue #14167), so their
# "pass" and "fail" runs are not a controlled comparison. This workflow pins
# both labels explicitly and answers the three questions that matter:
#
#   1) AVAILABLE - does torch.backends.mps.is_available() differ between the images?
#   2) USABLE    - does an actual MPS allocation + matmul succeed, or raise the
#                  "MPS backend out of memory" error reported in issue #9918?
#   3) NUMERICS  - do CPU and MPS produce bit-identical results, and does the MPS
#                  result differ between macos-15 and macos-26?
#
# Question 3 is the reporter's actual complaint: their baselines are CPU-derived
# but the `mps` parametrization asserts against them exactly.

on:
  workflow_dispatch:

jobs:
  probe:
    strategy:
      fail-fast: false
      matrix:
        # macos-15 and macos-26 are both arm64; macos-latest is included to show
        # which image the label currently resolves to.
        os: [macos-15, macos-26, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install torch
        run: python -m pip install --quiet torch numpy

      - name: Probe MPS (availability, usability, numerics)
        run: |
          cat > probe.py <<'PY'
          import os, platform, subprocess
          import torch

          def sh(cmd):
              try:
                  r = subprocess.run(cmd, shell=True, capture_output=True, text=True, timeout=90)
                  return r.stdout.strip()
              except Exception as e:
                  return f"<error: {e}>"

          print("=== environment ===")
          print("label/image :", os.environ.get("MATRIX_OS"))
          print("ImageVersion:", os.environ.get("ImageVersion"))
          print("macOS       :", sh("sw_vers -productVersion"), sh("sw_vers -buildVersion"))
          print("arch        :", platform.machine())
          print("torch       :", torch.__version__)

          print("=== 1) availability ===")
          built = torch.backends.mps.is_built()
          avail = torch.backends.mps.is_available()
          print("mps.is_built    :", built)
          print("mps.is_available:", avail)

          print("=== GPU as seen by the VM ===")
          print(sh("system_profiler SPDisplaysDataType"))

          print("=== 2) usability (issue #9918 OOM check) ===")
          if avail:
              try:
                  t = torch.ones(1024, 1024, device="mps")
                  val = (t @ t).sum().item()
                  print("alloc + matmul  : OK (checksum", val, ")")
              except Exception as e:
                  print("alloc + matmul  : FAILED", type(e).__name__, e)
          else:
              print("alloc + matmul  : skipped (mps unavailable)")

          print("=== 3) numerics: CPU vs MPS ===")
          if avail:
              torch.manual_seed(0)
              a, b = torch.randn(256, 256), torch.randn(256, 256)
              cpu = a @ b
              mps = (a.to("mps") @ b.to("mps")).cpu()
              print("matmul bit-identical:", torch.equal(cpu, mps))
              print("matmul max abs diff :", (cpu - mps).abs().max().item())

              # conv2d is what SAM2's image encoder leans on
              torch.manual_seed(0)
              x, w = torch.randn(1, 3, 64, 64), torch.randn(8, 3, 3, 3)
              c_cpu = torch.nn.functional.conv2d(x, w)
              c_mps = torch.nn.functional.conv2d(x.to("mps"), w.to("mps")).cpu()
              print("conv2d bit-identical:", torch.equal(c_cpu, c_mps))
              print("conv2d max abs diff :", (c_cpu - c_mps).abs().max().item())

              # Fixed-input fingerprint: compare this value ACROSS the two images.
              # If macos-15 and macos-26 print different fingerprints, the MPS
              # kernels themselves changed with the OS.
              torch.manual_seed(42)
              f = torch.randn(512, 512).to("mps")
              print("MPS fingerprint     : %.12f" % (f @ f).sum().item())
          else:
              print("skipped (mps unavailable)")
          PY
          python probe.py
        env:
          MATRIX_OS: ${{ matrix.os }}

  sam2:
    # Runs the reporter's actual SAM2 workload (not just matmul/conv2d) so we can
    # compare the ops SAM2 really uses across the two images.
    #
    # Established so far: on macos-15 CPU and MPS agree exactly (3 masks / area 9905
    # / iou 0.985302). On macos-26 CPU gives the same 3 masks but MPS finds ZERO, then
    # dies downstream in torchvision box_area with
    #   IndexError: index 2 is out of bounds for dimension 1 with size 0
    # Deterministic (3/3), on both torch 2.12.1 and 2.13.0 — so a newer torch is not
    # the fix. Each device is run 3x with a full traceback to keep proving that.
    #
    # Open question this matrix answers: is there ANY torch that works on macos-26?
    strategy:
      fail-fast: false
      matrix:
        include:
          # Baseline: the reporter's version (2.12.1) and current (2.13.0) on both
          # images. Known so far: macos-15 + 2.12.1 works; macos-26 fails on both.
          - { os: macos-15, torch: "2.12.1" }
          - { os: macos-15, torch: "2.13.0" }
          - { os: macos-26, torch: "2.12.1" }
          - { os: macos-26, torch: "2.13.0" }
          # Sweep older torch on macos-26 only: is there ANY working version there?
          # 2.8.0 predates macOS 26; 2.9.1 is the first stable released after it.
          # If one of these passes, this is a PyTorch regression with a bisectable
          # window (actionable upstream). If all fail, the problem is macOS 26 /
          # Metal itself and no torch version helps.
          - { os: macos-26, torch: "2.8.0" }
          - { os: macos-26, torch: "2.9.1" }
          - { os: macos-26, torch: "2.10.0" }
          - { os: macos-26, torch: "2.11.0" }
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install SAM2 stack (torch ${{ matrix.torch }})
        run: |
          python -m pip install --quiet "torch==${{ matrix.torch }}" torchvision numpy opencv-python-headless huggingface_hub
          python -m pip install --quiet "git+https://github.com/facebookresearch/sam2@2b90b9f5ceec907a1c18123530e92e794ad901a4"

      # Only torch is pinned above; torchvision/numpy/opencv are resolved by pip, and
      # pip selects wheels by platform tag, which differs between macOS 15 and 26. So
      # dump the resolved stack to prove the Python side is identical across images.
      #
      # Then dump the Metal/MPS framework versions. These are NOT in the torch wheel --
      # they ship with the OS, and torch's MPS backend calls into them at runtime. That
      # is the mechanism by which one identical torch binary can behave differently on
      # two macOS versions, and this step is what turns that from a claim into evidence.
      - name: Show resolved deps and OS Metal/MPS framework versions
        run: |
          echo "=== resolved Python stack (should match across images) ==="
          python -m pip freeze | grep -iE "^(torch|torchvision|numpy|opencv|pillow|hydra|iopath|SAM)" || true
          echo
          echo "=== wheels actually chosen (platform tag is baked into the filename) ==="
          python - <<'PY'
          import importlib.metadata as md
          for name in ["torch", "torchvision", "numpy", "opencv-python-headless"]:
              try:
                  d = md.distribution(name)
                  wheel = next((f for f in (d.files or []) if str(f).endswith("WHEEL")), None)
                  tag = ""
                  if wheel:
                      tag = " | ".join(
                          line for line in d.read_text(str(wheel)).splitlines()
                          if line.startswith("Tag:")
                      )
                  print(f"{name:24s} {d.version:12s} {tag}")
              except Exception as e:
                  print(f"{name:24s} <{type(e).__name__}: {e}>")
          PY
          echo
          echo "=== macOS ==="
          sw_vers
          echo
          echo "=== Metal / MPS frameworks (ship WITH the OS, not with torch) ==="
          for fw in Metal MetalPerformanceShaders MetalPerformanceShadersGraph; do
            found=""
            for p in "/System/Library/Frameworks/$fw.framework/Resources/Info.plist" \
                     "/System/Library/Frameworks/$fw.framework/Versions/Current/Resources/Info.plist"; do
              if [ -f "$p" ]; then
                v=$(plutil -extract CFBundleVersion raw "$p" 2>/dev/null || echo "?")
                s=$(plutil -extract CFBundleShortVersionString raw "$p" 2>/dev/null || echo "?")
                echo "$fw: version=$v short=$s"
                found=1
                break
              fi
            done
            [ -n "$found" ] || echo "$fw: <no Info.plist on disk (dyld shared cache)>"
          done

      - name: Run SAM2 mask generation on CPU and MPS
        run: |
          cat > sam2_probe.py <<'PY'
          import os
          import traceback
          import numpy as np
          import cv2
          import torch
          from sam2.automatic_mask_generator import SAM2AutomaticMaskGenerator

          mask_settings = {
              "points_per_side": 4, "points_per_batch": 4,
              "pred_iou_thresh": 0.80, "stability_score_thresh": 0.80,
              "stability_score_offset": 0.1, "crop_n_layers": 1,
              "box_nms_thresh": 0.1, "crop_n_points_downscale_factor": 1,
              "min_mask_region_area": 5, "use_m2m": True,
          }

          # Same fixed input the reporter's snippet uses: two white circles.
          img = np.zeros((100, 100, 3), np.uint8)
          white, filled = (255, 255, 255), -1
          cv2.circle(img, (30, 30), 10, white, filled)
          cv2.circle(img, (70, 65), 15, white, filled)

          print("image:", os.environ.get("MATRIX_OS"), "| torch:", torch.__version__,
                "| mps.is_available:", torch.backends.mps.is_available())

          def run(device):
              model = SAM2AutomaticMaskGenerator.from_pretrained(
                  "facebook/sam2.1-hiera-tiny", device=device,
                  apply_postprocessing=False, **mask_settings,
              )
              masks = model.generate(img)
              n = len(masks)
              area = int(np.sum([m["area"] for m in masks])) if n else 0
              iou = float(np.mean([m["predicted_iou"] for m in masks])) if n else float("nan")
              print(f"  device={device:3s}  num_masks={n:3d}  total_area={area:6d}  mean_iou={iou:.6f}")

          # Repeat each device: a hard OS/kernel difference reproduces every time,
          # a flake does not.
          for dev in ["cpu"] + (["mps"] if torch.backends.mps.is_available() else []):
              for attempt in (1, 2, 3):
                  try:
                      print(f"attempt {attempt}:", end=" ")
                      run(dev)
                  except Exception as e:
                      print(f"  device={dev:3s}  FAILED {type(e).__name__}: {e}")
                      traceback.print_exc()
          PY
          python sam2_probe.py
        env:
          MATRIX_OS: ${{ matrix.os }}
